# Crestline Shreshth v2 — Corrected Training Configuration
# Key fixes from v1:
#   - network_dim: 8 → 32 (more capacity for complex architecture)
#   - network_alpha: 1 → 16 (half of dim = stable training)
#   - resolution: 512 → 768 (preserves architectural detail)
#   - mixed_precision: fp16 → bf16 (RTX 5060 native, fewer NaN errors)
#   - pretrained_model_name_or_path: local file (no HuggingFace download)
#   - train_data_dir: now points to consolidated repo dataset
#   - output_dir: saves directly into repo models folder

bucket_no_upscale         = true
bucket_reso_steps         = 64
cache_latents             = true
caption_extension         = ".txt"
clip_skip                 = 1
dynamo_backend            = "no"
enable_bucket             = true

# Training duration
# Math: (11 ext × 20 rep) + (21 int × 20 rep) = 640 images/epoch
# batch_size=2 → 320 steps/epoch → 1920 steps = 6 full epochs
epoch                     = 6
max_train_steps           = 1920
train_batch_size          = 2

# Optimizer — unchanged, still the correct choice
optimizer_type            = "AdamW8bit"
optimizer_args            = []
learning_rate             = 0.0001
unet_lr                   = 0.0001
lr_scheduler              = "cosine"
lr_scheduler_num_cycles   = 1
lr_scheduler_power        = 1
lr_warmup_steps           = 0.05
gradient_accumulation_steps = 1

# Loss
loss_type                 = "l2"
huber_c                   = 0.1
huber_scale               = 1
huber_schedule            = "snr"

# Network — CRITICAL FIX: dim 8→32, alpha 1→16
network_module            = "networks.lora"
network_dim               = 32
network_alpha             = 16
network_args              = []
network_train_unet_only   = true

# Precision — CRITICAL FIX: fp16→bf16
mixed_precision           = "bf16"
save_precision            = "bf16"

# Resolution — CRITICAL FIX: 512→768 preserves architectural detail
resolution                = "768,768"
min_bucket_reso           = 256
max_bucket_reso           = 1024

# Model paths — local files, no internet needed
pretrained_model_name_or_path = "C:/Users/Devansh Tyagi/Documents/ComfyUI/models/checkpoints/v1-5-pruned-emaonly-fp16.safetensors"
train_data_dir            = "C:/Users/Devansh Tyagi/Desktop/Projects/RealEstate-GenAI-Crestline/dataset"
output_dir                = "C:/Users/Devansh Tyagi/Desktop/Projects/RealEstate-GenAI-Crestline/models"
output_name               = "Crestline_Shreshth_v2"
logging_dir               = "C:/Users/Devansh Tyagi/Desktop/Projects/RealEstate-GenAI-Crestline/logs"

# Save a checkpoint after every epoch so you can pick the best one
save_every_n_epochs       = 1
save_model_as             = "safetensors"

# Sample images during training to monitor progress
sample_prompts            = "C:/Users/Devansh Tyagi/Desktop/Projects/RealEstate-GenAI-Crestline/training/sample_prompt.txt"
sample_sampler            = "dpm_adaptive"
sample_every_n_steps      = 320

# Misc
max_token_length          = 75
max_timestep              = 1000
max_grad_norm             = 1
max_data_loader_n_workers = 0
prior_loss_weight         = 1
noise_offset_type         = "Original"
xformers                  = true
